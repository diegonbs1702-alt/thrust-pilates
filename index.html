<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrust Pilates Reformer | Reserva tu Clase</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#4a6385', /* Azul elegante principal (Textos y CTAs) */
                            white: '#ffffff',
                            beige: '#c1a384', /* Beige principal (#c1a384) */
                            offwhite: '#fafafa',
                        }
                    },
                    fontFamily: {
                        serif: ['Cormorant', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background-color: #c1a384; color: #4a6385; }
        ::selection { background-color: #4a6385; color: white; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ÍCONOS (SVGs Inline)
        // ==========================================
        const IconArrowRight = ({className="w-5 h-5"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconStar = () => <svg className="w-5 h-5 fill-brand-beige text-brand-beige" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const IconMenu = () => <svg className="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconX = () => <svg className="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconMapPin = ({className="w-5 h-5"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconCheck = () => <svg className="w-5 h-5 text-brand-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconCheckCircle = ({className="w-5 h-5"}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconShieldCheck = () => <svg className="w-10 h-10 text-brand-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path></svg>;
        const IconWhatsApp = () => <svg className="w-7 h-7" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>;

        // ==========================================
        // COMPONENTE: FORMULARIO ZEIGARNIK (Tripwire $150)
        // ==========================================
        const ZeigarnikModal = ({ isOpen, onClose }) => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({ isFirstTime: null, hasInjury: null, injuryDetails: '', name: '', phone: '' });

            if (!isOpen) return null;

            const handleNext = () => setStep(step + 1);
            
            const handlePayment = (e) => {
                e.preventDefault();
                alert(`Redirigiendo a pasarela de pago segura para cobrar $150 MXN a nombre de ${formData.name}.`);
                onClose();
                setTimeout(() => setStep(1), 500); 
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-brand-dark/80 backdrop-blur-md animate-fade-in">
                    <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl relative animate-slide-up flex flex-col min-h-[400px]">
                        
                        {/* Header Modal */}
                        <div className="flex justify-between items-center p-6 border-b border-gray-100">
                            <div className="flex gap-2">
                                {[1, 2, 3, 4].map(i => (
                                    <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${step >= i ? 'w-8 bg-brand-dark' : 'w-4 bg-gray-200'}`}></div>
                                ))}
                            </div>
                            <button onClick={onClose} className="text-gray-400 hover:text-brand-dark transition-colors"><IconX /></button>
                        </div>

                        {/* Contenido Dinámico por Pasos */}
                        <div className="p-8 flex-1 flex flex-col justify-center">
                            
                            {/* PASO 1 */}
                            {step === 1 && (
                                <div className="animate-fade-in">
                                    <h3 className="text-2xl font-serif font-bold text-brand-dark mb-6 text-center">¿Es tu primera vez haciendo Pilates Reformer?</h3>
                                    <div className="space-y-3">
                                        <button onClick={() => { setFormData({...formData, isFirstTime: true}); handleNext(); }} className="w-full text-left px-6 py-4 rounded-xl border border-gray-200 hover:border-brand-dark hover:bg-brand-beige/10 transition-all font-medium flex justify-between group">
                                            Sí, soy principiante <span className="opacity-0 group-hover:opacity-100 transition-opacity text-brand-dark">→</span>
                                        </button>
                                        <button onClick={() => { setFormData({...formData, isFirstTime: false}); handleNext(); }} className="w-full text-left px-6 py-4 rounded-xl border border-gray-200 hover:border-brand-dark hover:bg-brand-beige/10 transition-all font-medium flex justify-between group">
                                            No, ya tengo experiencia <span className="opacity-0 group-hover:opacity-100 transition-opacity text-brand-dark">→</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* PASO 2 */}
                            {step === 2 && (
                                <div className="animate-fade-in">
                                    <h3 className="text-2xl font-serif font-bold text-brand-dark mb-6 text-center">¿Tienes alguna lesión que debamos conocer?</h3>
                                    <p className="text-sm text-brand-dark/70 text-center mb-6">Cuidamos tu biomecánica. Queremos asegurarnos de adaptarnos a ti.</p>
                                    <div className="space-y-3">
                                        <button onClick={() => { setFormData({...formData, hasInjury: false}); handleNext(); }} className="w-full text-left px-6 py-4 rounded-xl border border-gray-200 hover:border-brand-dark hover:bg-brand-beige/10 transition-all font-medium flex items-center justify-between">
                                            Ninguna, estoy al 100% <IconCheck />
                                        </button>
                                        <div className={`p-4 rounded-xl border transition-all ${formData.hasInjury ? 'border-brand-dark bg-brand-beige/10' : 'border-gray-200'}`}>
                                            <button onClick={() => setFormData({...formData, hasInjury: true})} className="w-full text-left font-medium mb-2">Sí, tengo una lesión</button>
                                            {formData.hasInjury && (
                                                <div className="mt-3 animate-fade-in">
                                                    <input type="text" placeholder="Ej. Dolor lumbar, rodilla..." value={formData.injuryDetails} onChange={e => setFormData({...formData, injuryDetails: e.target.value})} className="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-1 focus:ring-brand-dark outline-none text-sm mb-3 text-brand-dark" />
                                                    <button onClick={handleNext} className="w-full bg-brand-dark text-white py-2 rounded-lg text-sm font-bold">Continuar</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PASO 3 */}
                            {step === 3 && (
                                <div className="animate-fade-in">
                                    <h3 className="text-2xl font-serif font-bold text-brand-dark mb-2 text-center">Último paso</h3>
                                    <p className="text-sm text-brand-dark/70 text-center mb-6">¿A dónde enviamos tu confirmación?</p>
                                    <form onSubmit={(e) => { e.preventDefault(); handleNext(); }} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-brand-dark/60 uppercase tracking-wider mb-1">Nombre Completo</label>
                                            <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-brand-dark outline-none transition-all text-brand-dark" placeholder="Ana Suárez" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-brand-dark/60 uppercase tracking-wider mb-1">Teléfono (WhatsApp)</label>
                                            <input required type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-brand-dark outline-none transition-all text-brand-dark" placeholder="999 123 4567" />
                                        </div>
                                        <button type="submit" className="w-full bg-brand-dark text-white px-6 py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition-colors mt-2">
                                            Continuar
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* PASO 4: TRIPWIRE ($150) */}
                            {step === 4 && (
                                <div className="animate-fade-in text-center">
                                    <div className="w-16 h-16 bg-brand-beige/20 rounded-full flex items-center justify-center mx-auto mb-4 text-brand-dark">
                                        <IconStar />
                                    </div>
                                    <h3 className="text-2xl font-serif font-bold text-brand-dark mb-2">Aplica a nuestro programa</h3>
                                    <p className="text-brand-dark/80 text-sm mb-6">Asegura tu lugar pagando únicamente tu clase muestra. Si decides quedarte, se abona a tu paquete.</p>
                                    
                                    <div className="bg-brand-beige/10 border border-brand-beige/30 rounded-xl p-4 mb-6 flex justify-between items-center">
                                        <div className="text-left">
                                            <p className="font-bold text-brand-dark">Clase Muestra</p>
                                            <p className="text-xs text-brand-dark/70">Paso 1 de tu Reestructuración</p>
                                        </div>
                                        <div className="text-xl font-bold text-brand-dark">$150 <span className="text-xs text-brand-dark/70 font-normal">MXN</span></div>
                                    </div>

                                    <button onClick={handlePayment} className="w-full bg-brand-dark text-white px-6 py-4 rounded-xl font-bold shadow-[0_8px_20px_rgba(74,99,133,0.3)] hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
                                        Reserva tu primera clase con $150 MXN <IconArrowRight />
                                    </button>
                                    <p className="text-xs text-brand-dark/50 mt-4 flex items-center justify-center gap-1">🔒 Pago 100% seguro encriptado</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // APLICACIÓN PRINCIPAL
        // ==========================================
        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // Referencias directas al DOM para evitar el lag de React state en el scroll
            const floatBtnRef = useRef(null);
            const waBtnRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);

                    // Lógica fluida para detener botones antes del footer
                    const footer = document.getElementById('ubicacion');
                    if (footer && floatBtnRef.current && waBtnRef.current) {
                        const footerRect = footer.getBoundingClientRect();
                        const windowHeight = window.innerHeight;
                        
                        if (footerRect.top < windowHeight) {
                            const overlap = windowHeight - footerRect.top;
                            floatBtnRef.current.style.bottom = `${24 + overlap}px`;
                            waBtnRef.current.style.bottom = `${24 + overlap}px`;
                        } else {
                            floatBtnRef.current.style.bottom = '24px';
                            waBtnRef.current.style.bottom = '24px';
                        }
                    }
                };
                
                // Usamos passive: true para rendimiento a 60fps
                window.addEventListener('scroll', handleScroll, { passive: true });
                handleScroll(); 
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // TODOS LOS BOTONES DE RESERVA NAVEGAN A LA OFERTA GRAND SLAM
            const scrollToOffer = () => {
                const el = document.getElementById('oferta');
                if(el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };
            
            // SOLO ESTA FUNCIÓN ABRE EL FORMULARIO
            const openModal = () => { setIsModalOpen(true); setIsMenuOpen(false); };

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if(el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };

            const links = [
                { name: 'Nuestras Clases', id: 'clases' },
                { name: 'Coaches', id: 'coaches' },
                { name: 'Testimonios', id: 'testimonios' },
                { name: 'El Programa', id: 'oferta' },
                { name: 'Blog', id: 'blog' },
            ];

            return (
                <div className="relative font-sans text-brand-dark bg-brand-beige min-h-screen">
                    <ZeigarnikModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} />

                    {/* Botón Flotante WhatsApp */}
                    <a ref={waBtnRef}
                       href="https://wa.me/529990000000?text=Hola,%20me%20gustaría%20saber%20más%20sobre%20el%20programa%20de%20Thrust%20Pilates" 
                       target="_blank" rel="noreferrer" 
                       className="fixed left-6 z-40 bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform"
                       style={{ bottom: '24px' }}>
                        <IconWhatsApp />
                    </a>

                    {/* Botón Flotante CTA Principal */}
                    <div ref={floatBtnRef} 
                         className={`fixed right-6 z-40 transition-opacity duration-300 ${isScrolled ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
                         style={{ bottom: '24px' }}>
                        <button onClick={scrollToOffer} className="bg-brand-dark text-white px-6 py-4 rounded-full font-bold shadow-2xl flex items-center gap-2 hover:opacity-90 transition-opacity">
                            Reserva tu Clase <IconArrowRight className="w-5 h-5" />
                        </button>
                    </div>

                    {/* Navegación Retráctil */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'glass-nav shadow-sm py-4 border-b border-brand-dark/5' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                            <div className="font-serif text-3xl font-bold tracking-tight cursor-pointer text-brand-dark" onClick={() => window.scrollTo(0,0)}>
                                THRUST <span className="italic font-light">Pilates</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={scrollToOffer} className="hidden md:flex bg-brand-dark text-white px-6 py-2.5 rounded-full font-bold hover:opacity-90 transition-opacity text-sm">
                                    Reserva tu Clase
                                </button>
                                <button onClick={() => setIsMenuOpen(true)} className="text-brand-dark hover:opacity-70 transition-opacity p-1">
                                    <IconMenu />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Menú Overlay Hamburguesa */}
                    <div className={`fixed inset-0 bg-brand-beige z-[60] transition-transform duration-500 ease-in-out flex flex-col ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-6 flex justify-end">
                            <button onClick={() => setIsMenuOpen(false)} className="text-brand-dark hover:opacity-70 transition-opacity p-1">
                                <IconX />
                            </button>
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center space-y-8">
                            {links.map((link, i) => (
                                <button key={i} onClick={() => scrollTo(link.id)} className="text-3xl md:text-5xl font-serif font-bold text-brand-dark hover:opacity-70 transition-opacity">
                                    {link.name}
                                </button>
                            ))}
                            <button onClick={scrollToOffer} className="mt-8 bg-brand-dark text-white px-8 py-4 rounded-full text-xl font-bold shadow-xl hover:opacity-90 transition-opacity">
                                Reserva tu Clase
                            </button>
                        </div>
                    </div>

                    {/* HERO SECTION CON IMAGEN DE FONDO OPACA */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-brand-beige">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-brand-beige"></div>
                            {/* Imagen de clase con baja opacidad y efecto multiply para heredar los tonos beige */}
                            <img 
                                src="HeroPilates.jpg" 
                                alt="Clase de Pilates Reformer" 
                                className="absolute inset-0 w-full h-full object-cover opacity-50 mix-blend-multiply"
                            />
                            {/* Gradiente para fundir visualmente el final del hero hacia la siguiente sección blanca */}
                            <div className="absolute inset-0 bg-gradient-to-b from-brand-beige/50 via-brand-beige/20 to-white"></div>
                        </div>
                        
                        <div className="relative z-10 text-center px-6 max-w-4xl mx-auto mt-20">
                            <div className="inline-block border border-brand-dark/20 rounded-full px-4 py-1.5 backdrop-blur-sm mb-6 bg-white/30 shadow-sm">
                                <p className="text-brand-dark text-xs font-bold tracking-widest uppercase">Mérida, Yucatán</p>
                            </div>
                            <h1 className="text-5xl md:text-7xl lg:text-8xl font-serif font-bold text-brand-dark leading-tight mb-6 drop-shadow-sm">
                                Reestructura y Tonifica Tu Cuerpo<br/><span className="italic font-light text-white drop-shadow-md">En 30 días</span>
                            </h1>
                            <p className="text-lg md:text-xl text-brand-dark/90 mb-10 font-medium max-w-2xl mx-auto drop-shadow-sm">
                                El único estudio de Pilates Reformer en Mérida con camas Merrithew™. Sin ruido, sin distracciones. Solo resultados.
                            </p>
                            <button onClick={scrollToOffer} className="bg-brand-dark text-white px-8 py-5 rounded-full text-lg font-bold shadow-[0_8px_30px_rgba(74,99,133,0.3)] hover:scale-105 transition-transform duration-300 flex items-center justify-center gap-2 mx-auto">
                                Reserva tu Clase <IconArrowRight />
                            </button>
                        </div>
                    </section>

                    {/* NUEVA SECCIÓN: ASÍ SE VE UNA CLASE EN THRUST (VIDEO) */}
                    <section className="py-24 px-6 bg-white border-b border-brand-gold/20">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-12">
                                <span className="text-brand-dark/60 font-bold tracking-widest uppercase text-sm">La Experiencia</span>
                                <h2 className="text-4xl md:text-5xl font-serif font-bold mt-2 text-brand-dark">Así se ve una Clase en Thrust</h2>
                                <p className="mt-4 text-lg text-brand-dark/80 max-w-2xl mx-auto font-medium">
                                    Nuestras coaches certificadas te llevan al limite de tus capacidades, y te ayudan a desarrollar fuerza en el abdomen y tonificar el cuerpo.
                                </p>
                            </div>
                            
                            <div className="relative rounded-[2rem] overflow-hidden shadow-2xl aspect-video border-4 border-brand-beige/30 bg-brand-dark">
                                <video autoPlay loop muted playsInline className="object-cover w-full h-full opacity-90">
                                    <source src="clase.mp4" type="video/mp4" />
                                </video>
                                <div className="absolute inset-0 bg-brand-dark/10 mix-blend-overlay pointer-events-none"></div>
                            </div>

                            <div className="mt-12 flex justify-center">
                                <button onClick={scrollToOffer} className="text-brand-dark font-bold text-sm uppercase tracking-wider flex items-center gap-2 hover:gap-3 transition-all hover:text-brand-beige">
                                    Quiero vivir esta experiencia <IconArrowRight className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN CLASES */}
                    <section id="clases" className="py-24 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <span className="text-brand-dark/60 font-bold tracking-widest uppercase text-sm">El Método</span>
                                <h2 className="text-4xl md:text-5xl font-serif font-bold mt-2 text-brand-dark">Nuestras Clases</h2>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { title: "Abs Focus", desc: "Core de acero. Rutina diseñada para tornear la zona abdominal sin cargar el cuello ni la espalda baja. 45 min.", img: "abs.jpg" },
                                    { title: "Brazos y Espalda", desc: "Postura y definición. Enfocado en esculpir el tren superior, mejorando la postura que arruina la oficina. 45 min.", img: "brazos.jpg" },
                                    { title: "Full Body", desc: "Reingeniería total. Elevamos el ritmo cardíaco para quemar grasa mientras elongamos todos los músculos. 50 min.", img: "body.jpg" }
                                ].map((clase, i) => (
                                    <div key={i} className="group bg-brand-beige/10 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-brand-beige/30">
                                        <div className="h-64 overflow-hidden relative">
                                            <div className="absolute inset-0 bg-brand-dark/10 group-hover:bg-transparent transition-colors z-10"></div>
                                            <img src={clase.img} alt={clase.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                        </div>
                                        <div className="p-8">
                                            <h3 className="text-2xl font-serif font-bold text-brand-dark mb-3">{clase.title}</h3>
                                            <p className="text-brand-dark/80 text-sm leading-relaxed mb-6">{clase.desc}</p>
                                            <button onClick={scrollToOffer} className="text-brand-dark font-bold text-sm uppercase tracking-wider flex items-center gap-1 group-hover:gap-2 transition-all">
                                                Reserva tu Clase <IconArrowRight className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN COACHES */}
                    <section id="coaches" className="py-24 bg-brand-beige border-y border-white/20 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 mb-12">
                            <h2 className="text-4xl md:text-5xl font-serif font-bold mt-2 text-white">Nuestras Coaches</h2>
                            <p className="text-brand-dark/90 mt-4 max-w-xl font-medium">Certificadas internacionalmente. Ellas no solo cuentan repeticiones, corrigen tu postura y moivimientos para evitar trabajar el cuerpo y evitar lesiones.</p>
                        </div>
                        
                        <div className="flex md:grid md:grid-cols-4 gap-6 overflow-x-auto hide-scrollbar px-6 max-w-7xl mx-auto pb-8 snap-x">
                            {[
                                { name: "Sheila", role: "Especialista Abs & Postura", img: "Sheila.jpg" },
                                { name: "Valentina", role: "Master Full Body", img: "Valentina.jpg" },
                                { name: "Mariana", role: "Rehab & Flexibilidad", img: "Mariana.jpg" },
                                { name: "Sofía", role: "Athletic Performance", img: "Sofia.jpg" }
                            ].map((coach, i) => (
                                <div key={i} className="min-w-[250px] md:min-w-0 bg-white rounded-2xl p-4 snap-center shadow-lg">
                                    <img src={coach.img} alt={coach.name} className="w-full aspect-[4/5] object-cover rounded-xl mb-4 grayscale-[10%] hover:grayscale-0 transition-all duration-300" />
                                    <h4 className="text-xl font-bold font-serif text-brand-dark">{coach.name}</h4>
                                    <p className="text-xs text-brand-beige uppercase tracking-widest font-bold mt-1">{coach.role}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SECCIÓN TESTIMONIOS */}
                    <section id="testimonios" className="py-24 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col items-center justify-center mb-16">
                                <a href="https://maps.app.goo.gl/eVDN3qRdrybUvb7s7" target="_blank" rel="noreferrer" className="flex items-center gap-2 mb-4 hover:scale-105 transition-transform bg-brand-beige/10 px-5 py-2.5 rounded-full border border-brand-beige/30 shadow-sm">
                                    <div className="flex text-brand-beige">
                                        {[1,2,3,4,5].map(i => <IconStar key={i} />)}
                                    </div>
                                    <span className="font-bold text-xl text-brand-dark">4.9</span>
                                </a>
                                <h2 className="text-3xl md:text-4xl font-serif font-bold text-center text-brand-dark">Basado en reseñas reales de Google</h2>
                            </div>

                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { name: "Andrea", text: "Encantada con este estudio, ya casi voy para el año yendo, súper amable staff, clases muy buenas, coaches preparadas y pendientes de ti en todo momento, dinámicas creativas y que te hacen disfrutar mucho tu experiencia." },
                                    { name: "Deira", text: "Súper estudio! La clase de Sheila me encantó, trabaje muy bien la zona abdominal pero a la vez fue un ejercicio relajado y agradable! Definitivamente regresaría! Súper recomendado, todo impecable." },
                                    { name: "Kuko", text: "Excelente lugar para prevenir lesiones y entrenar propiocepción, fuerza y resistencia. El lugar limpio, higiénico y la instructora muy buena guía. Se ajusta a las capacidades de cada persona." }
                                ].map((review, i) => (
                                    <div key={i} className="bg-brand-beige/10 border border-brand-beige/20 p-8 rounded-3xl relative shadow-sm">
                                        <div className="text-5xl text-brand-beige font-serif absolute top-6 right-6 opacity-50">"</div>
                                        <div className="flex text-brand-beige mb-4 w-4 h-4">
                                            {[1,2,3,4,5].map(star => <svg key={star} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}
                                        </div>
                                        <p className="text-brand-dark/90 mb-6 text-sm leading-relaxed italic">"{review.text}"</p>
                                        <p className="font-bold text-brand-dark uppercase text-xs tracking-widest">{review.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* GRAND SLAM OFFER */}
                    <section id="oferta" className="py-24 px-6 bg-brand-beige relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-white/20 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="max-w-4xl mx-auto relative z-10">
                            <div className="text-center mb-14">
                                <span className="text-brand-dark/80 font-bold tracking-widest uppercase text-sm mb-2 block">El Siguiente Paso</span>
                                <h2 className="text-4xl md:text-6xl font-serif font-bold mb-6 text-brand-dark">Reestructuración y Tonificacion Corporal en 12 Clases</h2>
                                <p className="text-brand-dark/80 text-lg md:text-xl max-w-2xl mx-auto font-medium">No vendemos clases sueltas. Vendemos una transformación completa para que te ejercites sin lastimar tus articulaciones.</p>
                            </div>

                            <div className="bg-white rounded-3xl p-8 md:p-12 shadow-2xl relative border border-white/50">
                                <div className="flex justify-between items-start mb-10 flex-col md:flex-row gap-6 border-b border-gray-100 pb-8">
                                    <div>
                                        <h3 className="text-3xl font-bold text-brand-dark mb-2">Paquete Mensual</h3>
                                        <p className="text-brand-dark/60 font-medium">Tus 30 días de reestructuración corporal profunda.</p>
                                    </div>
                                    <div className="text-left md:text-right bg-brand-beige/10 px-6 py-4 rounded-2xl border border-brand-beige/30">
                                        <p className="text-5xl font-bold text-brand-dark tracking-tight">$1,990 <span className="text-xl font-normal text-brand-dark/50">MXN</span></p>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-8 mb-10">
                                    <div className="space-y-5">
                                        <p className="font-bold text-xl mb-4 text-brand-dark">Lo que incluye:</p>
                                        {[
                                            '12 Sesiones de Athletic Reformer Pilates',
                                            'Acceso a camas premium Merrithew™',
                                            'Atención personalizada (máx 8 camas)',
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-start gap-3">
                                                <IconCheckCircle className="w-6 h-6 text-brand-beige flex-shrink-0" />
                                                <span className="text-brand-dark/80 leading-snug font-medium">{item}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-5 bg-brand-dark p-6 rounded-2xl relative overflow-hidden shadow-md">
                                        <p className="font-bold text-white text-xl mb-2">Bonos Exclusivos:</p>
                                        {[
                                            'Guía Digital: Tu Primera Clase de Pilates',
                                            'Acceso a eventos grupales exclusivos de miembros Thrust',
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-start gap-3">
                                                <div className="mt-1 bg-white rounded-full p-1"><IconCheckCircle className="w-3 h-3 text-brand-dark" /></div>
                                                <span className="text-sm font-bold text-white">{item}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Garantía */}
                                <div className="bg-brand-beige/10 rounded-2xl p-6 md:p-8 flex items-start md:items-center gap-6 mb-10 flex-col md:flex-row border border-brand-beige/30">
                                    <div className="bg-white p-4 rounded-full shadow-sm text-brand-dark">
                                        <IconShieldCheck />
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-brand-dark text-xl mb-1">Garantía Incondicional</h4>
                                        <p className="text-brand-dark/80 text-sm leading-relaxed">
                                            Si no te convenció la clase de muestra a seguir con nuestro plan de Reestructuración y Tonificación Corporal, <strong className="text-brand-dark">te devolvemos tu dinero.</strong>
                                        </p>
                                    </div>
                                </div>

                                {/* EL ÚNICO BOTÓN QUE ABRE EL FORMULARIO */}
                                <button onClick={openModal} className="w-full bg-brand-dark text-white px-8 py-5 rounded-2xl text-xl font-bold shadow-[0_10px_40px_rgba(74,99,133,0.3)] hover:opacity-90 hover:scale-[1.02] transition-all duration-300">
                                    Reserva tu primera clase con $150 MXN
                                </button>
                                <p className="text-center text-brand-dark/50 font-medium text-sm mt-4">Inicia tu transformación hoy asegurando tu clase muestra.</p>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN BLOG */}
                    <section id="blog" className="py-24 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-end mb-12">
                                <div>
                                    <span className="text-brand-dark/50 font-bold tracking-widest uppercase text-sm">Educación</span>
                                    <h2 className="text-4xl font-serif font-bold mt-2 text-brand-dark">Thrust Blog</h2>
                                </div>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-6">
                                {[
                                    { tag: "Principiantes", title: "5 Cosas que debes saber antes de tu primera clase de Pilates", date: "Lectura de 3 min" },
                                    { tag: "Longevidad", title: "Por qué el Athletic Reformer es el secreto anti-edad", date: "Lectura de 4 min" },
                                    { tag: "Biomecánica", title: "El mito del impacto: Construyendo fuerza sin dañar tus articulaciones", date: "Lectura de 5 min" }
                                ].map((post, i) => (
                                    <div key={i} className="group cursor-pointer">
                                        <div className="h-48 bg-brand-beige/20 rounded-2xl mb-4 overflow-hidden border border-brand-beige/30">
                                            <img src="blog.jpg" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-90" alt="Blog cover" />
                                        </div>
                                        <span className="text-xs font-bold text-brand-beige uppercase tracking-wider">{post.tag}</span>
                                        <h3 className="text-xl font-serif font-bold mt-2 mb-2 text-brand-dark group-hover:opacity-70 transition-opacity">{post.title}</h3>
                                        <p className="text-xs text-brand-dark/50">{post.date}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* FOOTER MINIMALISTA CON MAPS */}
                    <footer id="ubicacion" className="bg-brand-beige pt-24 pb-12 px-6 border-t border-white/20 text-center relative z-30">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="font-serif text-4xl font-bold tracking-tight text-white mb-6">
                                THRUST <span className="italic font-light">Pilates</span>
                            </h2>
                            
                            <a href="https://maps.app.goo.gl/eVDN3qRdrybUvb7s7" target="_blank" rel="noreferrer" className="inline-flex flex-col items-center justify-center p-6 bg-white rounded-3xl hover:shadow-xl transition-all group mb-12 border border-white">
                                <div className="w-12 h-12 bg-brand-dark rounded-full flex items-center justify-center text-white mb-4 group-hover:scale-110 transition-transform">
                                    <IconMapPin />
                                </div>
                                <p className="font-bold text-brand-dark text-lg">Mérida, Yucatán</p>
                                <p className="text-brand-dark/70 text-sm mt-1">Haz clic para ver cómo llegar en Google Maps</p>
                            </a>

                            <div className="flex flex-col md:flex-row items-center justify-between border-t border-brand-dark/10 pt-8 mt-8">
                                <p className="text-sm text-brand-dark/80 mb-4 md:mb-0 font-bold">© 2026 Thrust Pilates. Reformer Pilates en Mérida.</p>
                                <div className="flex gap-6">
                                    <a href="#" className="text-sm font-bold text-brand-dark/80 hover:text-white uppercase tracking-wider transition-colors">Instagram</a>
                                    <a href="#" className="text-sm font-bold text-brand-dark/80 hover:text-white uppercase tracking-wider transition-colors">Términos</a>
                                </div>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
